<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trình tạo Dữ liệu Lớp Học</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background: #2c3e50; color: white; }
        .container { max-width: 600px; margin: auto; background: #34495e; padding: 20px; border-radius: 10px; }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; border: none; border-radius: 5px; box-sizing: border-box; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #27ae60; color: white; }
        .btn-copy { background: #3498db; color: white; margin-top: 10px; }
        pre { background: #1a252f; padding: 15px; border-radius: 5px; border-left: 5px solid #3498db; overflow-x: auto; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h2>Tạo Dữ liệu Lớp Học</h2>
    <input type="text" id="tenLop" placeholder="Tên lớp (ví dụ: Lớp 12A1)">
    
    <hr>
    
    <input type="text" id="hsTen" placeholder="Họ tên">
    <input type="text" id="hsSdt" placeholder="SĐT">
    <input type="text" id="hsHocPhi" placeholder="Học phí">
    <button class="btn-add" onclick="themHs()">+ Thêm vào danh sách</button>

    <h3>Kết quả (Dạng sạch):</h3>
    <pre id="jsonOutput">// Nhập thông tin lớp và học sinh ở trên</pre>
    <button class="btn-copy" onclick="copyJson()">📋 Copy vào Code</button>
</div>

<script>
    let danhSachHs = [];

    function themHs() {
        let tenLop = document.getElementById('tenLop').value.trim();
        let ten = document.getElementById('hsTen').value.trim();
        let sdt = document.getElementById('hsSdt').value.trim();
        let hocPhi = document.getElementById('hsHocPhi').value.trim();

        if(!tenLop || !ten) return alert("Vui lòng nhập Tên lớp và Tên học sinh!");

        danhSachHs.push({ ten: ten, lop: tenLop, sdt: sdt, hocPhi: hocPhi });
        
        let output = `{\n    tenLop: "${tenLop}",\n    hocSinh: [\n`;
        output += danhSachHs.map(hs => 
            `        { ten: "${hs.ten}", lop: "${hs.lop}", sdt: "${hs.sdt}", hocPhi: "${hs.hocPhi}" }`
        ).join(',\n');
        output += `\n    ]\n},`;
        
        document.getElementById('jsonOutput').innerText = output;
        
        // Reset input
        document.getElementById('hsTen').value = '';
        document.getElementById('hsSdt').value = '';
        document.getElementById('hsHocPhi').value = '';
    }

    function copyJson() {
        let text = document.getElementById('jsonOutput').innerText;
        navigator.clipboard.writeText(text).then(() => alert("Đã copy định dạng sạch!"));
    }
</script>

</body>
</html>
